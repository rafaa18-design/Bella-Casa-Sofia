# =============================================================================
# Asani AI Agent Template - Production
# =============================================================================
# Only the agent. Redis and PostgreSQL are external services in production.
# Usage: docker compose up -d
# =============================================================================

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
