# =============================================================================
# Asani AI Agent Template - Development
# =============================================================================
# Agent + local Redis + Chat UI for testing
# Usage: docker compose -f docker-compose.dev.yml up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Agent Service
  # ---------------------------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=["*"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (session state, cache, rate limiting)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Chat UI (Next.js - testing only)
  # ---------------------------------------------------------------------------
  chat:
    build:
      context: ./chat
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
